version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aura-postgres
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.15.0
    container_name: aura-neo4j
    environment:
      NEO4J_AUTH: neo4j/aura_password
    ports:
      - "7474:7474" # HTTP GUI
      - "7687:7687" # Bolt protocol for Agent access
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7-alpine
    container_name: aura-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
  neo4jdata:
