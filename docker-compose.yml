version: '3.8'

services:
  # -------------------------
  # GraphRAG Data Layer
  # -------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aura-postgres
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15.0
    container_name: aura-neo4j
    environment:
      NEO4J_AUTH: neo4j/aura_password
    ports:
      - "7474:7474" # HTTP GUI
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7-alpine
    container_name: aura-redis
    ports:
      - "6379:6379"

  # -------------------------
  # Microservices Layer
  # -------------------------
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: aura-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aura_user:aura_password@postgres:5432/aura_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=aura_password
      - OPENAI_API_KEY=${OPENAI_API_KEY:-} # Pulls from your .env if available
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aura-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
  neo4jdata:
